  <style>
    html, body { margin: 0; padding: 0; background: #2B2724; min-height: 100vh; }
    body {
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px; box-sizing: border-box;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(200,101,74,0.18), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(135,163,131,0.10), transparent 60%),
        #1F1C1A;
    }
    .stage { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .screen-picker {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      background: rgba(43, 39, 36, 0.9); border: 1px solid #3D3631;
      backdrop-filter: blur(12px);
      border-radius: 12px; padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .screen-picker button {
      background: transparent; border: 0; color: #C9C2B9;
      font-family: Inter; font-size: 13px; padding: 8px 12px;
      border-radius: 8px; cursor: pointer; text-align: left;
      min-width: 140px;
    }
    .screen-picker button.active { background: #C8654A; color: #fff; }
    .screen-picker button:hover:not(.active) { background: rgba(255,255,255,0.05); color: #F0EBE4; }
    .screen-picker .label {
      font-size: 10px; color: #8F887F; letter-spacing: 0.08em;
      text-transform: uppercase; font-weight: 500; padding: 6px 12px 2px;
    }
    #root { display: flex; align-items: center; justify-content: center; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Primitives.standalone.jsx"></script>
  <script type="text/babel" src="PhoneFrame.jsx"></script>
  <script type="text/babel" src="HomeScreen.jsx"></script>
  <script type="text/babel" src="CardViewScreen.jsx"></script>
  <script type="text/babel" src="BrowseListScreen.jsx"></script>
  <script type="text/babel" src="ContactDetailScreen.jsx"></script>
  <script type="text/babel" src="SettingsScreen.jsx"></script>
  <script type="text/babel" src="ListsManagerScreen.jsx"></script>
  <script type="text/babel" src="ListConfigScreen.jsx"></script>
  <script type="text/babel" src="OnboardingPermissionsScreen.jsx"></script>
  <script type="text/babel" src="OnboardingCreateListScreen.jsx"></script>
  <script type="text/babel" src="OnboardingBulkAddScreen.jsx"></script>
  <script type="text/babel" src="WidgetGallery.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState } = React;

    function App() {
      const [screen, setScreen] = useState(() => localStorage.getItem('orbit.screen') || 'home');
      const [dark, setDark] = useState(() => localStorage.getItem('orbit.dark') === '1');
      const [currentList, setCurrentList] = useState({ id: 'inner', name: 'Inner orbit' });
      const [currentContact, setCurrentContact] = useState('Sarah Chen');

      const go = (s) => { setScreen(s); localStorage.setItem('orbit.screen', s); };
      const toggleDark = () => { setDark(d => { localStorage.setItem('orbit.dark', d ? '0' : '1'); return !d; }); };

      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      }, [dark]);

      const screenGroups = [
        { label: 'Main', screens: [
          { id: 'home',     label: 'Home' },
          { id: 'card',     label: 'Card view' },
          { id: 'browse',   label: 'Browse list' },
          { id: 'contact',  label: 'Contact detail' },
        ]},
        { label: 'Manage', screens: [
          { id: 'lists',    label: 'Lists manager' },
          { id: 'config',   label: 'List config' },
          { id: 'settings', label: 'Settings' },
        ]},
        { label: 'Onboarding', screens: [
          { id: 'ob-perms', label: '1 · Permissions' },
          { id: 'ob-list',  label: '2 · Create list' },
          { id: 'ob-add',   label: '3 · Bulk add' },
        ]},
        { label: 'Widgets', screens: [
          { id: 'widgets',  label: 'Widget gallery' },
        ]},
      ];

      let content;
      if (screen === 'home') content = <HomeScreen
        onOpenList={(id, name) => { setCurrentList({id, name}); go('card'); }}
        onOpenSettings={() => go('settings')}
      />;
      else if (screen === 'card') content = <CardViewScreen
        listName={currentList.name}
        onBack={() => go('home')}
        onCall={() => go('contact')}
      />;
      else if (screen === 'browse') content = <BrowseListScreen
        listName={currentList.name}
        onBack={() => go('home')}
        onOpenContact={(n) => { setCurrentContact(n); go('contact'); }}
      />;
      else if (screen === 'contact') content = <ContactDetailScreen
        name={currentContact}
        onBack={() => go('home')}
      />;
      else if (screen === 'settings') content = <SettingsScreen onBack={() => go('home')} />;
      else if (screen === 'lists') content = <ListsManagerScreen
        onBack={() => go('home')}
        onOpenList={(id, name) => { setCurrentList({id, name}); go('config'); }}
        onCreate={() => go('config')}
      />;
      else if (screen === 'config') content = <ListConfigScreen
        listName={currentList.name}
        onBack={() => go('lists')}
        onSave={() => go('lists')}
      />;
      else if (screen === 'ob-perms') content = <OnboardingPermissionsScreen
        onBack={() => go('home')}
        onContinue={() => go('ob-list')}
      />;
      else if (screen === 'ob-list') content = <OnboardingCreateListScreen
        onBack={() => go('ob-perms')}
        onContinue={() => go('ob-add')}
      />;
      else if (screen === 'ob-add') content = <OnboardingBulkAddScreen
        listName={currentList.name}
        onBack={() => go('ob-list')}
        onContinue={() => go('home')}
      />;

      return (
        <>
          <div className="screen-picker">
            {screenGroups.map(g => (
              <React.Fragment key={g.label}>
                <div className="label">{g.label}</div>
                {g.screens.map(s => (
                  <button key={s.id}
                    onClick={() => go(s.id)}
                    className={screen === s.id ? 'active' : ''}
                  >{s.label}</button>
                ))}
              </React.Fragment>
            ))}
            <div className="label" style={{ marginTop: 6 }}>Theme</div>
            <button onClick={toggleDark}>{dark ? '☾ Dark' : '☀ Light'}</button>
          </div>
          <div className="stage">
            {screen === 'widgets'
              ? <WidgetGallery />
              : <PhoneFrame dark={dark}>{content}</PhoneFrame>}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
