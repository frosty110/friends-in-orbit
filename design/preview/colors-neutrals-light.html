<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div class="row" style="gap:20px">
    <div class="swatch-cell">
      <div class="swatch" style="background:#FAF6F0;border:1px solid #E5DDD1"></div>
      <div class="swatch-label">Cream bg</div>
      <div class="swatch-hex">#FAF6F0</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#F2ECE2;border:1px solid #E5DDD1"></div>
      <div class="swatch-label">Cream deep</div>
      <div class="swatch-hex">#F2ECE2</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#FFFFFF;border:1px solid #E5DDD1"></div>
      <div class="swatch-label">Paper</div>
      <div class="swatch-hex">#FFFFFF</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#211E1C"></div>
      <div class="swatch-label">Ink</div>
      <div class="swatch-hex">#211E1C</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#6B6560"></div>
      <div class="swatch-label">Stone</div>
      <div class="swatch-hex">#6B6560</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#9A928B"></div>
      <div class="swatch-label">Stone soft</div>
      <div class="swatch-hex">#9A928B</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#E5DDD1"></div>
      <div class="swatch-label">Line</div>
      <div class="swatch-hex">#E5DDD1</div>
    </div>
  </div>
