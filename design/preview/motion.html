<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:28px 32px">
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-family:monospace;font-size:11px;color:#9A928B;width:70px">dur-fast</div>
      <div style="flex:1;height:6px;background:#F2ECE2;border-radius:3px;position:relative;max-width:260px"><div style="position:absolute;height:6px;width:25%;background:#C8654A;border-radius:3px"></div></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">150ms</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-family:monospace;font-size:11px;color:#9A928B;width:70px">dur-base</div>
      <div style="flex:1;height:6px;background:#F2ECE2;border-radius:3px;position:relative;max-width:260px"><div style="position:absolute;height:6px;width:50%;background:#C8654A;border-radius:3px"></div></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">250ms</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <div style="font-family:monospace;font-size:11px;color:#9A928B;width:70px">dur-slow</div>
      <div style="flex:1;height:6px;background:#F2ECE2;border-radius:3px;position:relative;max-width:260px"><div style="position:absolute;height:6px;width:70%;background:#C8654A;border-radius:3px"></div></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">350ms</div>
    </div>
  </div>
  <div style="margin-top:18px;display:flex;gap:18px;font-family:monospace;font-size:11px;color:#6B6560;flex-wrap:wrap">
    <div>ease-out · (0.22, 1, 0.36, 1)</div>
    <div>ease-in-out · (0.65, 0, 0.35, 1)</div>
    <div>ease-spring · (0.34, 1.26, 0.64, 1)</div>
  </div>
  <div style="margin-top:10px;font-family:Inter;font-size:13px;color:#6B6560;font-style:italic">Slow and warm. No confetti. No overshoot past 5%.</div>
</body></html>
