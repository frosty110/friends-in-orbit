<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:32px;background:#FAF6F0">
  <div style="display:flex;gap:24px;align-items:center">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:80px;height:80px;background:#FFFFFF;border-radius:16px;box-shadow:0 1px 2px rgba(33,30,28,.04),0 1px 1px rgba(33,30,28,.03)"></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">sm</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:80px;height:80px;background:#FFFFFF;border-radius:16px;box-shadow:0 2px 8px rgba(33,30,28,.06),0 1px 2px rgba(33,30,28,.04)"></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">md</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:80px;height:80px;background:#FFFFFF;border-radius:16px;box-shadow:0 2px 12px rgba(33,30,28,.05),0 1px 2px rgba(33,30,28,.03)"></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">card</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:80px;height:80px;background:#FFFFFF;border-radius:16px;box-shadow:0 8px 24px rgba(33,30,28,.08),0 2px 6px rgba(33,30,28,.04)"></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">lg</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:80px;height:80px;background:#FFFFFF;border-radius:16px;box-shadow:0 12px 36px rgba(33,30,28,.10),0 4px 12px rgba(33,30,28,.06)"></div>
      <div style="font-family:monospace;font-size:11px;color:#6B6560">hero</div>
    </div>
  </div>
</body></html>
