<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div class="row" style="gap:12px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:#EDD6CE;color:#9B4A32;border-radius:999px;font-size:13px;font-weight:500">
      <span style="width:8px;height:8px;border-radius:999px;background:#C8654A"></span>
      Due today
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:#D8E3D6;color:#4E6A4B;border-radius:999px;font-size:13px;font-weight:500">
      <span style="width:8px;height:8px;border-radius:999px;background:#87A383"></span>
      Caught up
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:#EEE3B8;color:#756321;border-radius:999px;font-size:13px;font-weight:500">
      <span style="width:8px;height:8px;border-radius:999px;background:#B49A3A"></span>
      Overdue
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:#E3DFDB;color:#524B45;border-radius:999px;font-size:13px;font-weight:500">
      <span style="width:8px;height:8px;border-radius:999px;background:#524B45"></span>
      Paused
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:#DCE1DE;color:#4D5652;border-radius:999px;font-size:13px;font-weight:500">
      <span style="width:8px;height:8px;border-radius:999px;background:#6B7570"></span>
      Syncing
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:#F2ECE2;color:#6B6560;border-radius:999px;font-size:13px;font-weight:500">
      <span style="width:8px;height:8px;border-radius:999px;background:#9A928B"></span>
      Quiet
    </div>
  </div>
  <div style="margin-top:16px;font-size:12px;color:#6B6560;letter-spacing:0.04em;text-transform:uppercase;font-weight:500">Semantic states · v2</div>
</body></html>
