<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div style="display:flex;gap:32px;align-items:flex-start">
    <!-- V1 -->
    <div>
      <div style="font-family:Inter;font-size:11px;color:#6B6560;letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:10px">V1 · original</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;max-width:300px">
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#EDD6CE;color:#9B4A32;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#C8654A"></span>Due</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#D8E3D6;color:#4E6A4B;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#87A383"></span>Caught up</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#F2E2BF;color:#8B6821;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#D4A144"></span>Overdue</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#F5E0DC;color:#A04838;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#A04838"></span>Paused</div>
      </div>
      <div style="font-family:Inter;font-size:11px;color:#9A928B;margin-top:10px;max-width:280px;line-height:1.5">Due / paused both sit in red family — blur at a glance.</div>
    </div>

    <!-- V2 -->
    <div>
      <div style="font-family:Inter;font-size:11px;color:#9B4A32;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:10px">V2 · tuned</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;max-width:300px">
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#EDD6CE;color:#9B4A32;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#C8654A"></span>Due</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#D8E3D6;color:#4E6A4B;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#87A383"></span>Caught up</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#EEE3B8;color:#756321;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#B49A3A"></span>Overdue</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#E3DFDB;color:#524B45;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#524B45"></span>Paused</div>
        <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#DCE1DE;color:#4D5652;border-radius:999px;font-size:12px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#6B7570"></span>Syncing</div>
      </div>
      <div style="font-family:Inter;font-size:11px;color:#9A928B;margin-top:10px;max-width:280px;line-height:1.5">Overdue cooled to olive. Pause softened to stone. New cool slate for info states.</div>
    </div>
  </div>
</body></html>
