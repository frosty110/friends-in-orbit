<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;background:#1F1C1A;color:#F0EBE4">
  <div class="row" style="gap:20px">
    <div class="swatch-cell">
      <div class="swatch" style="background:#1F1C1A;border:1px solid #3D3631"></div>
      <div class="swatch-label" style="color:#C9C2B9">Charcoal bg</div>
      <div class="swatch-hex" style="color:#8F887F">#1F1C1A</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#2B2724;border:1px solid #3D3631"></div>
      <div class="swatch-label" style="color:#C9C2B9">Graphite</div>
      <div class="swatch-hex" style="color:#8F887F">#2B2724</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#35302C;border:1px solid #3D3631"></div>
      <div class="swatch-label" style="color:#C9C2B9">Graphite deep</div>
      <div class="swatch-hex" style="color:#8F887F">#35302C</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#F0EBE4"></div>
      <div class="swatch-label" style="color:#C9C2B9">Cream text</div>
      <div class="swatch-hex" style="color:#8F887F">#F0EBE4</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#C9C2B9"></div>
      <div class="swatch-label" style="color:#C9C2B9">Cream dim</div>
      <div class="swatch-hex" style="color:#8F887F">#C9C2B9</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#D87560"></div>
      <div class="swatch-label" style="color:#C9C2B9">Accent (dark)</div>
      <div class="swatch-hex" style="color:#8F887F">#D87560</div>
    </div>
    <div class="swatch-cell">
      <div class="swatch" style="background:#3D3631"></div>
      <div class="swatch-label" style="color:#C9C2B9">Line</div>
      <div class="swatch-hex" style="color:#8F887F">#3D3631</div>
    </div>
  </div>
</body></html>
