<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:20px 24px;background:#FAF6F0;display:flex;align-items:center;justify-content:center">
  <!-- Hero contact card -->
  <div style="width:340px;padding:24px;background:#FFFFFF;border-radius:24px;box-shadow:0 12px 36px rgba(33,30,28,.10),0 4px 12px rgba(33,30,28,.06);display:flex;flex-direction:column;align-items:center;gap:16px;transform:rotate(-2deg)">
    <div style="align-self:flex-start;padding:4px 10px;background:#EDD6CE;border-radius:999px;font-family:Inter;font-size:12px;font-weight:500;color:#9B4A32;letter-spacing:0.04em">Inner orbit</div>

    <!-- Stats flanking the avatar -->
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:center;width:100%">
      <div style="text-align:right">
        <div style="font-family:Inter;font-size:10px;color:#6B6560;letter-spacing:0.08em;text-transform:uppercase;font-weight:500">Last called</div>
        <div style="font-family:Inter;font-size:15px;font-weight:600;color:#211E1C;margin-top:2px">11d ago</div>
        <div style="font-family:Inter;font-size:10px;color:#6B6560;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-top:10px">Total calls</div>
        <div style="font-family:Inter;font-size:15px;font-weight:600;color:#211E1C;margin-top:2px">47</div>
      </div>
      <div style="width:96px;height:96px;border-radius:999px;background:linear-gradient(135deg,#D8E3D6,#87A383);display:flex;align-items:center;justify-content:center;font-family:Inter;font-size:36px;font-weight:600;color:#3A5539">SC</div>
      <div style="text-align:left">
        <div style="font-family:Inter;font-size:10px;color:#6B6560;letter-spacing:0.08em;text-transform:uppercase;font-weight:500">Avg length</div>
        <div style="font-family:Inter;font-size:15px;font-weight:600;color:#211E1C;margin-top:2px">14m</div>
        <div style="font-family:Inter;font-size:10px;color:#6B6560;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-top:10px">Pickup rate</div>
        <div style="font-family:Inter;font-size:15px;font-weight:600;color:#4E6A4B;margin-top:2px">82%</div>
      </div>
    </div>

    <div style="font-family:Inter;font-size:28px;font-weight:600;color:#211E1C;letter-spacing:-0.01em;margin-top:2px">Sarah Chen</div>

    <!-- Best time block -->
    <div style="width:100%;padding:14px 16px;background:#FAF6F0;border-radius:14px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-family:Inter;font-size:11px;color:#6B6560;letter-spacing:0.08em;text-transform:uppercase;font-weight:500">Usually answers</div>
        <div style="font-family:Inter;font-size:13px;font-weight:600;color:#211E1C">6:42p – 9:15p</div>
      </div>
      <!-- 24h heat strip -->
      <div style="position:relative;height:22px">
        <div style="display:grid;grid-template-columns:repeat(24,1fr);gap:2px;height:100%">
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#E8DCCA;border-radius:2px"></div>
          <div style="background:#DDC9AE;border-radius:2px"></div>
          <div style="background:#D8BFA0;border-radius:2px"></div>
          <div style="background:#E0CDB4;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
          <div style="background:#E8DCCA;border-radius:2px"></div>
          <div style="background:#DDC9AE;border-radius:2px"></div>
          <div style="background:#D5B992;border-radius:2px"></div>
          <div style="background:#D0AE80;border-radius:2px"></div>
          <div style="background:#CE9F62;border-radius:2px"></div>
          <div style="background:#C8854A;border-radius:2px"></div>
          <div style="background:#B87340;border-radius:2px"></div>
          <div style="background:#A76337;border-radius:2px"></div>
          <div style="background:#C8854A;border-radius:2px"></div>
          <div style="background:#DDC9AE;border-radius:2px"></div>
          <div style="background:#EFE8DC;border-radius:2px"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:Inter;font-size:10px;color:#9A928B;letter-spacing:0.02em">
        <span>12a</span><span>6a</span><span>12p</span><span>6p</span><span>12a</span>
      </div>
    </div>
  </div>
</body></html>
