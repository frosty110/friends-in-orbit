<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px">
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <!-- Primary -->
    <button style="height:48px;padding:0 24px;background:#C8654A;color:#fff;border:0;border-radius:12px;font-family:Inter;font-size:16px;font-weight:500;display:inline-flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 1px 2px rgba(33,30,28,.08)">
      <img src="../assets/icons/phone-call.svg" width="18" height="18" style="filter:invert(1) brightness(2)">
      Call Sarah
    </button>
    <!-- Primary pressed -->
    <button style="height:48px;padding:0 24px;background:#9B4A32;color:#fff;border:0;border-radius:12px;font-family:Inter;font-size:16px;font-weight:500;cursor:pointer">Pressed</button>
    <!-- Secondary -->
    <button style="height:48px;padding:0 24px;background:#F2ECE2;color:#211E1C;border:0;border-radius:12px;font-family:Inter;font-size:16px;font-weight:500;cursor:pointer">Later</button>
    <!-- Ghost -->
    <button style="height:48px;padding:0 24px;background:transparent;color:#6B6560;border:0;border-radius:12px;font-family:Inter;font-size:16px;font-weight:500;cursor:pointer">Skip</button>
    <!-- Destructive -->
    <button style="height:48px;padding:0 24px;background:transparent;color:#A04838;border:1px solid #E5DDD1;border-radius:12px;font-family:Inter;font-size:16px;font-weight:500;cursor:pointer">Pause</button>
  </div>
</body></html>
