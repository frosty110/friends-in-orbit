<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:24px 28px;background:#FAF6F0">
  <div style="display:flex;flex-direction:column;gap:14px;max-width:360px">
    <!-- Field -->
    <div style="display:flex;flex-direction:column;gap:6px">
      <label style="font-family:Inter;font-size:12px;font-weight:500;color:#6B6560;letter-spacing:0.08em;text-transform:uppercase">List name</label>
      <input value="Inner orbit" style="height:48px;padding:0 16px;background:#FFFFFF;border:1px solid #E5DDD1;border-radius:12px;font-family:Inter;font-size:16px;color:#211E1C;outline:none">
    </div>
    <!-- Search -->
    <div style="position:relative">
      <img src="../assets/icons/magnifying-glass.svg" width="18" height="18" style="position:absolute;left:16px;top:50%;transform:translateY(-50%);opacity:.5">
      <input placeholder="Search your people" style="width:100%;box-sizing:border-box;height:48px;padding:0 16px 0 44px;background:#F2ECE2;border:0;border-radius:12px;font-family:Inter;font-size:16px;color:#211E1C;outline:none">
    </div>
    <!-- Toggle -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#FFFFFF;border-radius:12px;border:1px solid #E5DDD1">
      <div>
        <div style="font-family:Inter;font-size:16px;color:#211E1C">Minimal mode</div>
        <div style="font-family:Inter;font-size:14px;color:#6B6560">Hide list names</div>
      </div>
      <div style="width:44px;height:26px;background:#C8654A;border-radius:999px;position:relative">
        <div style="position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:999px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.15)"></div>
      </div>
    </div>
  </div>
</body></html>
