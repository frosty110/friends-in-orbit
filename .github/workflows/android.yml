name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Android SDK used by assembleDebug — setup-android@v3 adds cmdline-tools
      # and writes local.properties under the working dir for us.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-35 build-tools;35.0.0

      - name: ktlint
        run: ./gradlew :app:ktlintCheck --no-daemon

      # koverXmlReportDebug depends on testDebugUnitTest, so this runs the unit
      # tests AND produces the unified coverage report in one pass.
      - name: Unit tests + coverage
        run: ./gradlew :app:koverXmlReportDebug :app:koverHtmlReportDebug --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orbit-coverage
          path: android/app/build/reports/kover
          if-no-files-found: warn

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
