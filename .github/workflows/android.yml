name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Needed by the Kover PR-comment step to post/update a comment.
    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Android SDK used by assembleDebug — setup-android@v3 adds cmdline-tools
      # and writes local.properties under the working dir for us.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-35 build-tools;35.0.0

      # ktlint reports style issues but does NOT gate the build (continue-on-error).
      # Formatting is meant to be applied locally via the pre-commit hook
      # (git config core.hooksPath .githooks); CI only surfaces what's left.
      - name: ktlint
        continue-on-error: true
        run: ./gradlew :app:ktlintCheck --no-daemon

      # koverXmlReportDebug depends on testDebugUnitTest, so this runs the unit
      # tests AND produces the unified coverage report in one pass.
      - name: Unit tests + coverage
        run: ./gradlew :app:koverXmlReportDebug :app:koverHtmlReportDebug --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orbit-coverage
          path: android/app/build/reports/kover
          if-no-files-found: warn

      # Per-layer + per-package breakdown into the log, incl. a combined
      # domain+data "critical paths" figure. Pure-Python parse of the Kover
      # XML; never fails the build.
      - name: Coverage by layer
        if: always()
        continue-on-error: true
        run: python3 scripts/coverage-summary.py

      # Post the unified coverage as a PR comment (created once, updated in
      # place on later pushes). SHA-pinned to mi-kas/kover-report v2.4.
      # No min-coverage thresholds set yet, so this reports but never fails.
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d
        with:
          path: ${{ github.workspace }}/android/app/build/reports/kover/reportDebug.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (unit tests)
          update-comment: true

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Instrumented (androidTest) tests on an emulator, reporting their on-device
  # coverage via AGP's native JaCoCo report (Kover does not consume AGP
  # instrumented coverage). This surfaces a separate data/ui "instrumented
  # coverage" figure alongside the unit number from the build job. Non-blocking.
  instrumented:
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM hardware acceleration — required for a usable x86_64 emulator on
      # GitHub-hosted Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Run the instrumented suite, then AGP's native coverage report. The two
      # commands are separate so a flaky test can't block report generation; the
      # report reuses whatever .ec coverage the (cached) test run produced.
      # NOTE: each command must be one physical line — the action passes
      # backslash line-continuations through literally (Gradle saw '\' as a task).
      - name: Instrumented tests + AGP coverage report
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          working-directory: android
          script: |
            ./gradlew -PinstrumentedCoverage :app:connectedDebugAndroidTest --no-daemon || echo "::warning::instrumented tests had failures — continuing"
            ./gradlew -PinstrumentedCoverage :app:createDebugAndroidTestCoverageReport --no-daemon || echo "::warning::coverage report task failed — continuing"

      # Locate AGP's JaCoCo XML (path varies by AGP version) and summarise it by
      # layer. Self-diagnosing: lists the coverage files it finds.
      - name: Instrumented coverage by layer
        if: always()
        continue-on-error: true
        run: |
          echo "== coverage outputs =="
          find app/build/reports/coverage app/build/outputs/code_coverage -type f 2>/dev/null | head -50 || true
          REPORT=$(find app/build/reports/coverage -name '*.xml' 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            echo "== Parsing $REPORT =="
            python3 scripts/coverage-summary.py "$REPORT"
          else
            echo "No instrumented coverage XML found (see listing above)."
          fi

      - name: Upload instrumented coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orbit-coverage-instrumented
          path: android/app/build/reports/coverage
          if-no-files-found: warn
