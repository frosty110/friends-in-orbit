name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Needed by the Kover PR-comment step to post/update a comment.
    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Android SDK used by assembleDebug — setup-android@v3 adds cmdline-tools
      # and writes local.properties under the working dir for us.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-35 build-tools;35.0.0

      # ktlint reports style issues but does NOT gate the build (continue-on-error).
      # Formatting is meant to be applied locally via the pre-commit hook
      # (git config core.hooksPath .githooks); CI only surfaces what's left.
      - name: ktlint
        continue-on-error: true
        run: ./gradlew :app:ktlintCheck --no-daemon

      # koverXmlReportDebug depends on testDebugUnitTest, so this runs the unit
      # tests AND produces the unified coverage report in one pass.
      - name: Unit tests + coverage
        run: ./gradlew :app:koverXmlReportDebug :app:koverHtmlReportDebug --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orbit-coverage
          path: android/app/build/reports/kover
          if-no-files-found: warn

      # Per-layer + per-package breakdown into the log, incl. a combined
      # domain+data "critical paths" figure. Pure-Python parse of the Kover
      # XML; never fails the build.
      - name: Coverage by layer
        if: always()
        continue-on-error: true
        run: python3 scripts/coverage-summary.py

      # Post the unified coverage as a PR comment (created once, updated in
      # place on later pushes). SHA-pinned to mi-kas/kover-report v2.4.
      # No min-coverage thresholds set yet, so this reports but never fails.
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: mi-kas/kover-report@db9938358b8e1e6175dd4136132bf4eb7aa4ae6d
        with:
          path: ${{ github.workspace }}/android/app/build/reports/kover/reportDebug.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (unit tests)
          update-comment: true

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orbit-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  # Instrumented (androidTest) tests on an emulator, with coverage folded into
  # the debug Kover report so the per-layer numbers include data/ui exercised on
  # a real device. Non-blocking for now: this suite has never run in CI, so it is
  # being stabilised before it gates anything or feeds the PR-comment number.
  instrumented:
    runs-on: ubuntu-latest
    continue-on-error: true

    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM hardware acceleration — required for a usable x86_64 emulator on
      # GitHub-hosted Linux runners.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Runs connectedDebugAndroidTest inside the emulator via Kover. With
      # -PinstrumentedCoverage the debug build instruments androidTest, so
      # koverXmlReportDebug merges unit + instrumented coverage into one report.
      - name: Instrumented tests + merged coverage
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          working-directory: android
          # connectedDebugAndroidTest must run explicitly — Kover's report task
          # does NOT trigger it. Failures are tolerated on this first-ever CI run
          # so the report still merges coverage from whatever passed; the report
          # task then folds the on-device coverage into the debug Kover report.
          # NOTE: each command must be one physical line — the action passes
          # backslash line-continuations through literally (Gradle saw '\' as a task).
          script: |
            ./gradlew -PinstrumentedCoverage :app:connectedDebugAndroidTest --no-daemon || echo "::warning::instrumented tests had failures — continuing to report"
            ./gradlew -PinstrumentedCoverage :app:koverXmlReportDebug :app:koverHtmlReportDebug --no-daemon

      # Per-layer breakdown of the MERGED report (unit + instrumented).
      - name: Coverage by layer (incl. instrumented)
        if: always()
        continue-on-error: true
        run: python3 scripts/coverage-summary.py

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: orbit-coverage-merged
          path: android/app/build/reports/kover
          if-no-files-found: warn
