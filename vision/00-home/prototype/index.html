<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbit — Home redesign (sketch 001)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_prototype/theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: var(--font-sans); background: #E9E2D6; color: var(--fg); }
  [data-theme="dark"] body { background: #16140F; }

  /* ---------- Sketch toolbar ---------- */
  .toolbar { position: sticky; top: 0; z-index: 50; display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-3) var(--space-4); padding: var(--space-3) var(--space-4); background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); }
  [data-theme="dark"] .toolbar { background: rgba(31,28,26,0.85); }
  .toolbar .brand { font-weight: 700; letter-spacing: -0.01em; color: var(--accent); }
  .toolbar .spacer { flex: 1; }
  .segwrap { display: flex; align-items: center; gap: 8px; }
  .seglabel { font-size: 12px; color: var(--fg-subtle); text-transform: uppercase; letter-spacing: var(--tracking-caps); font-weight: var(--fw-medium); }
  .seg-group { display: flex; gap: 4px; background: var(--bg-subtle); padding: 3px; border-radius: var(--radius-full); }
  .seg-group button { border: 0; cursor: pointer; font: inherit; font-size: 13px; font-weight: var(--fw-medium); padding: 5px 11px; border-radius: var(--radius-full); background: transparent; color: var(--fg-muted); }
  .seg-group button.active { background: var(--surface); color: var(--fg); box-shadow: var(--shadow-md); }
  .ctrl { border: 1px solid var(--line); background: var(--surface); color: var(--fg-muted); cursor: pointer; font: inherit; font-size: 13px; padding: 6px 12px; border-radius: var(--radius-full); }
  .ctrl.on { color: var(--accent); border-color: var(--accent); }

  /* ---------- Phone frame ---------- */
  .stage { display: flex; justify-content: center; padding: var(--space-5) var(--space-4) var(--space-8); }
  .phone { width: 393px; height: 820px; background: var(--bg); border-radius: 44px; box-shadow: 0 24px 60px rgba(33,30,28,0.22), 0 0 0 10px #111, 0 0 0 11px #2a2622; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 26px 6px; font-size: 13px; font-weight: 600; color: var(--fg); flex: none; }
  .statusbar .dots { display: flex; gap: 4px; align-items: center; }
  .statusbar .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-subtle); }
  .screen { flex: 1; overflow-y: auto; }
  .screen::-webkit-scrollbar { width: 0; }

  /* ---------- App bar ---------- */
  .appbar { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-5) var(--space-2); }
  .wordmark { font-size: var(--fs-title); font-weight: 700; letter-spacing: -0.02em; color: var(--fg); }
  .appbar .icons { display: flex; gap: 2px; }
  .iconbtn { width: 40px; height: 40px; border-radius: var(--radius-full); border: 0; background: transparent; display: grid; place-items: center; cursor: pointer; color: var(--fg-muted); }
  .iconbtn:hover { background: var(--bg-subtle); }
  .iconbtn svg { width: 22px; height: 22px; }

  /* ---------- Post-call banner ---------- */
  .banner { margin: var(--space-2) var(--space-4) var(--space-1); background: var(--accent-tint); border-radius: var(--radius-lg); padding: var(--space-4); display: none; gap: var(--space-3); align-items: center; animation: drop var(--dur-base) var(--ease-out); }
  body.show-banner .banner { display: flex; }
  @keyframes drop { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
  .banner .b-text { flex: 1; }
  .banner .b-title { font-size: var(--fs-meta); color: var(--accent-press); font-weight: var(--fw-semi); }
  .banner .b-sub { font-size: var(--fs-micro); color: var(--accent-press); opacity: 0.85; }
  .banner .b-add { border: 0; cursor: pointer; font: inherit; font-size: var(--fs-meta); font-weight: var(--fw-semi); background: var(--accent); color: var(--accent-fg); padding: 8px 14px; border-radius: var(--radius-full); }
  .banner .b-dismiss { border: 0; background: transparent; cursor: pointer; color: var(--accent-press); font: inherit; font-size: var(--fs-micro); }

  /* ---------- Header ---------- */
  .header { padding: var(--space-3) var(--space-5) var(--space-3); }
  .eyebrow { font-size: var(--fs-micro); font-weight: var(--fw-semi); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-subtle); }
  .header .date { font-size: var(--fs-h2); font-weight: var(--fw-semi); color: var(--fg); margin-top: 2px; letter-spacing: -0.01em; }

  /* ---------- List card — tonal two-zone ---------- */
  .cards { display: flex; flex-direction: column; gap: var(--space-3); padding: 0 var(--space-4) var(--space-2); }
  .card { border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; cursor: pointer; background: var(--cardwash, var(--surface)); transition: transform var(--dur-fast) var(--ease-out); }
  .card:active { transform: scale(0.99); }

  /* Zone 1 — tinted header band (name + next up) */
  .card-top { background: var(--cardband); display: flex; gap: var(--space-3); align-items: center; padding: var(--space-4); }
  .name-col { flex: 0 0 118px; }
  .name-col.chip { background: var(--cardchip); border-radius: var(--radius-md); padding: var(--space-3); }
  .list-name { font-size: 16px; font-weight: var(--fw-semi); color: var(--namefg); line-height: var(--lh-snug); }
  .list-sub { font-size: 13px; color: var(--namefg); opacity: .72; margin-top: 3px; }
  .smart-glyph { opacity: 0.85; display: inline-flex; vertical-align: -2px; margin-left: 4px; }
  .smart-glyph svg { width: 13px; height: 13px; }
  .nextup { flex: 1; min-width: 0; display: flex; align-items: center; gap: var(--space-3); }
  .avatar { flex: none; position: relative; overflow: hidden; border-radius: var(--radius-full); display: grid; place-items: center; font-weight: var(--fw-semi); width: 44px; height: 44px; font-size: var(--fs-h3); box-shadow: 0 0 0 2px var(--cardband); }
  .avatar-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .nextup .meta { flex: 1; min-width: 0; }
  .nextup .nlabel { font-size: var(--fs-micro); font-weight: var(--fw-semi); letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--fg-subtle); }
  .nextup .nname { font-size: var(--fs-h3); font-weight: var(--fw-semi); color: var(--fg); line-height: 1.2; }
  .nextup .nwhy { font-size: var(--fs-meta); color: var(--fg-muted); line-height: var(--lh-snug); }
  .chev { flex: none; color: var(--fg-subtle); display: grid; place-items: center; }
  .chev svg { width: 20px; height: 20px; }

  /* Zone 2 — lighter wash under the rhythm */
  .rhythm { background: var(--cardwash); padding: var(--space-3) var(--space-4) var(--space-4); }
  .rhythm-head { font-size: var(--fs-micro); color: var(--fg-subtle); margin-bottom: 6px; letter-spacing: var(--tracking-caps); text-transform: uppercase; font-weight: var(--fw-medium); }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); align-items: end; gap: 2px; }
  .day { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .daycol { height: 50px; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; width: 100%; }
  .daylabel { font-size: 12px; color: var(--fg-subtle); }
  .day.today .daylabel { color: var(--accent); font-weight: var(--fw-semi); }
  .emptydot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); }
  .barstack { width: 26px; display: flex; flex-direction: column-reverse; gap: 3px; }
  .seg { width: 26px; border-radius: 6px; }

  /* ---------- New list + footer ---------- */
  .newlist { margin: var(--space-2) var(--space-4) 0; height: var(--tap-min); border: 1.5px dashed var(--line); border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--fg-subtle); font-size: var(--fs-meta); cursor: pointer; }
  .newlist:hover { border-color: var(--accent); color: var(--accent); }
  .footer { text-align: center; color: var(--fg-muted); font-size: var(--fs-body); line-height: var(--lh-body); padding: var(--space-8) var(--space-7); }

  /* ---------- Screenshot mode ---------- */
  body.shot { background: #E9E2D6; }
  body.shot[data-bgdark] { background: #16140F; }
  body.shot .toolbar { display: none; }
  body.shot .stage { padding: 18px; }
</style>
</head>
<body>
  <div class="toolbar">
    <span class="brand">Orbit · sketch 001</span>
    <span class="spacer"></span>
    <div class="segwrap"><span class="seglabel">Card style</span>
      <div class="seg-group" data-group="cardStyle"><button data-val="twotone">Two-tone</button><button data-val="chip">Name chip</button></div></div>
    <div class="segwrap"><span class="seglabel">Rhythm color</span>
      <div class="seg-group" data-group="rcolor"><button data-val="call">Per-call</button><button data-val="person">Per-person</button></div></div>
    <div class="segwrap"><span class="seglabel">Quiet week</span>
      <div class="seg-group" data-group="quiet"><button data-val="dots">Dots</button><button data-val="hide">Hide</button></div></div>
    <button class="ctrl" id="bannerBtn">Banner</button>
    <button class="ctrl" id="themeBtn">◐ Dark</button>
  </div>

  <div class="stage"><div class="phone"></div></div>

<script>
/* ----------------------------------------------------------------
   Selectable options:
     cardStyle : twotone | chip   — name as bold text on the band, or a deeper chip
     rcolor    : call    | person  — what the rhythm colors mean
     quiet     : dots    | hide    — how a week with no qualifying calls renders
   Tonal card: deeper chip (head) > tinted header band (bg) > lighter graph wash.
   Data fictional, PII-free. rhythm = LAST 7 DAYS (last = today); calls < 3 min ignored.
   ---------------------------------------------------------------- */
const STATE = { cardStyle: "twotone", rcolor: "person", quiet: "dots" };

const LABELS = ["S","M","T","W","T","F","S"]; // last 7 days; index 6 = today
const LISTS = [
  { name: "Inner orbit", members: 12, smart: true, tint: "terracotta",
    next: { name: "Kai", initial: "K", tint: "terracotta", why: "3 weeks since you last spoke", photo: "https://i.pravatar.cc/120?img=12" },
    rhythm: [ [{who:"Sarah",m:14}], [{who:"Theo",m:2}], [{who:"Mara",m:26},{who:"Kai",m:6}], [],
              [{who:"Cameron",m:41},{who:"Dad",m:5}], [{who:"Sarah",m:9},{who:"Priya",m:2}], [{who:"Mara",m:4}] ] },
  { name: "Late night", members: 5, smart: true, tint: "slate",
    next: { name: "Mara", initial: "M", tint: "olive", why: "you usually talk on weekends", photo: "https://i.pravatar.cc/120?img=5" },
    rhythm: [ [{who:"Theo",m:33}], [], [{who:"Theo",m:2}], [{who:"Mara",m:18}], [],
              [{who:"Theo",m:52},{who:"Mara",m:11}], [{who:"Mara",m:7}] ] },
  { name: "People who ground me", members: 8, smart: false, tint: "sage",
    next: { name: "Sarah", initial: "S", tint: "sage", why: "it's been a quiet month" },
    rhythm: [ [], [{who:"Dad",m:22}], [], [{who:"Mom",m:4}], [{who:"Priya",m:11},{who:"Dad",m:2}], [], [] ] },
  { name: "Mentors", members: 3, smart: false, tint: "olive",
    next: { name: "Noor", initial: "N", tint: "sage", why: "haven't spoken in a while" },
    rhythm: [ [], [{who:"Elena",m:2}], [], [], [], [], [] ] },  // no qualifying calls -> quiet week
];

const BAR_AREA = 50;  // tallest day fills ~80% (axis = 125% of busiest day)
const PAL = ["#C8654A","#87A383","#B49A3A","#6B7570","#8E5141","#D4A144","#9A928B"];
const BAR = { terracotta:"#C8654A", sage:"#87A383", olive:"#B49A3A", slate:"#6B7570", clay:"#8E5141", amber:"#D4A144", stone:"#9A928B" };
const PERSON = { Kai:"terracotta", Sarah:"sage", Mara:"olive", Cameron:"slate", Theo:"clay", Dad:"stone", Priya:"amber", Mom:"terracotta", Noor:"sage", Elena:"olive" };

const I = {
  search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>`,
  list:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>`,
  gear:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>`,
  smart:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M21 3l-7 7"/><path d="M8 21H3v-5"/><path d="M3 21l7-7"/></svg>`,
  chev:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>`,
  plus:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>`,
};

const av = (initial, tint, photo) => {
  const img = photo ? `<img class="avatar-photo" src="${photo}" alt="" onerror="this.remove()">` : "";
  return `<div class="avatar" style="background:var(--p-${tint}-head);color:var(--p-${tint}-fg)">${initial}${img}</div>`;
};

const dayTotal = day => day.filter(c => c.m >= 3).reduce((s, c) => s + c.m, 0);

// Bars are RELATIVE to this list's own last-7-days range: tallest day fills ~80%
// of the column (axis = 125% of the busiest day), so a list of short chats and a
// list of long calls each read fully within their own scale.
function rhythm(days) {
  const scaleMax = Math.max(1, ...days.map(dayTotal)) * 1.25;
  const hpx = m => Math.max(6, Math.round((m / scaleMax) * BAR_AREA));
  return days.map((day, idx) => {
    const today = idx === days.length - 1 ? " today" : "";
    const calls = day.filter(c => c.m >= 3);
    let mark;
    if (!calls.length) mark = `<div class="emptydot"></div>`;
    else mark = `<div class="barstack">` + calls.map((c, si) => {
      const col = STATE.rcolor === "person" ? (BAR[PERSON[c.who]] || "#9A928B") : PAL[(idx + si) % PAL.length];
      return `<div class="seg" title="${c.who} · ${c.m} min" style="height:${hpx(c.m)}px;background:${col}"></div>`;
    }).join("") + `</div>`;
    return `<div class="day${today}"><div class="daycol">${mark}</div><div class="daylabel">${LABELS[idx]}</div></div>`;
  }).join("");
}

function card(list) {
  const t = list.tint;
  const cardStyle = `--cardband:var(--p-${t}-bg);--cardwash:var(--p-${t}-wash);--cardchip:var(--p-${t}-head);--namefg:var(--p-${t}-fg)`;
  const glyph = list.smart ? `<span class="smart-glyph" title="Smart list">${I.smart}</span>` : "";
  const nameColCls = STATE.cardStyle === "chip" ? "name-col chip" : "name-col";
  const hasCalls = list.rhythm.some(day => day.some(c => c.m >= 3));
  const showRhythm = hasCalls || STATE.quiet !== "hide";
  const rhythmBlock = showRhythm
    ? `<div class="rhythm"><div class="rhythm-head">Last 7 days</div><div class="days">${rhythm(list.rhythm)}</div></div>` : "";
  return `
  <div class="card" style="${cardStyle}">
    <div class="card-top">
      <div class="${nameColCls}">
        <div class="list-name">${list.name}${glyph}</div>
        <div class="list-sub">${list.members} people</div>
      </div>
      <div class="nextup">
        ${av(list.next.initial, list.next.tint, list.next.photo)}
        <div class="meta">
          <div class="nlabel">Next up</div>
          <div class="nname">${list.next.name}</div>
          <div class="nwhy">${list.next.why}</div>
        </div>
        <div class="chev">${I.chev}</div>
      </div>
    </div>
    ${rhythmBlock}
  </div>`;
}

function render() {
  document.querySelector(".phone").innerHTML = `
    <div class="statusbar"><span>9:41</span><span class="dots"><span></span><span></span><span></span></span></div>
    <div class="screen">
      <div class="appbar">
        <span class="wordmark">Orbit</span>
        <div class="icons">
          <button class="iconbtn" title="Search">${I.search}</button>
          <button class="iconbtn" title="Lists">${I.list}</button>
          <button class="iconbtn" title="Settings">${I.gear}</button>
        </div>
      </div>
      <div class="banner">
        <div class="b-text"><div class="b-title">You just called Cameron</div><div class="b-sub">Add a note while it's fresh</div></div>
        <button class="b-add">Add a note</button><button class="b-dismiss">Dismiss</button>
      </div>
      <div class="header"><div class="eyebrow">Today</div><div class="date">Saturday 21 June</div></div>
      <div class="cards">${LISTS.map(card).join("")}</div>
      <div class="newlist">${I.plus} New list</div>
      <div class="footer">The call that makes your day can make someone else's.<br>You deserve to be the one who reaches out.</div>
    </div>`;
}

function syncSegs() {
  document.querySelectorAll(".seg-group").forEach(g => {
    const k = g.dataset.group;
    g.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.val === STATE[k]));
  });
}
document.querySelectorAll(".seg-group").forEach(g => g.addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  STATE[g.dataset.group] = b.dataset.val; syncSegs(); render();
}));
document.getElementById("themeBtn").addEventListener("click", e => {
  const dark = document.documentElement.getAttribute("data-theme") === "dark";
  document.documentElement.setAttribute("data-theme", dark ? "light" : "dark");
  e.target.classList.toggle("on", !dark); e.target.textContent = dark ? "◐ Dark" : "◐ Light";
});
document.getElementById("bannerBtn").addEventListener("click", e => {
  document.body.classList.toggle("show-banner");
  e.target.classList.toggle("on", document.body.classList.contains("show-banner"));
});

/* screenshot mode: ?cardStyle=twotone&rcolor=person&quiet=dots&theme=dark&banner=1&shot=1 */
const q = new URLSearchParams(location.search);
["cardStyle","rcolor","quiet"].forEach(k => { if (q.get(k)) STATE[k] = q.get(k); });
if (q.get("theme") === "dark") document.documentElement.setAttribute("data-theme", "dark");
if (q.get("banner") === "1") document.body.classList.add("show-banner");
syncSegs(); render();
if (q.get("shot") === "1") { document.body.classList.add("shot"); if (q.get("theme") === "dark") document.body.setAttribute("data-bgdark","1"); }
</script>
</body>
</html>
